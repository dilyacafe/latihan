<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <style>
        body { text-align: center; padding-top: 10px; font-family: sans-serif; }
        .button-sound {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s; }
     .button-sound:active { transform: scale(0.95);
  background-color: #0056b3; /* Warna sedikit gelap saat diklik */ }
    </style>
            

    </style>
</head>
<body>

    <!-- Tombol yang memicu JavaScript -->
    <button class="button-sound" onclick="playSound()">MAKANAN!</button>

    <!-- Elemen Audio Tersembunyi -->
    <audio id="clickSound" src="klik.mp3" preload="auto"></audio>

    <script>
        function playSound() {
            var sound = document.getElementById("clickSound");
            sound.currentTime = 0; // Mengulang suara jika diklik cepat
            sound.play();
        }
    </script>

</body>
</html>
